<div>
    Delete the client (workspace spec) after the build (<code>p4 client -d</code>).
    <br>In a pipeline: <code>cleanup(true)</code> or <code>cleanup(deleteClient: true)</code> or
    <code>cleanup(deleteClient: true, forceDeleteClient: false)</code>.
    <br>When <code>cleanup(deleteClient: false, forceDeleteClient: false)</code>, it means that the
    client is not deleted.
</div>
