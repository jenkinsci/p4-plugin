<div>
	<b>P4 Port</b>
	<p>The port the P4 Server listens for connections. Typically
		P4 Server use '1666', but the IP address or host name must be
		specified. For example:</p>
	<ul>
		<li>10.0.0.4:1666</li>
		<li>perforce:1666</li>
		<li>perforce.domain.com:1666</li>
	</ul>
	<p>Do not use the prefix 'ssl:', use the SSL check box.</p>
</div>
