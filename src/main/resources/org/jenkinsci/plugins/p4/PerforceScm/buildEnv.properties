P4_CHANGELIST.blurb=The last P4 changelist number included in the populated workspace, or the latest changelist number across the P4 Server if no changelist is found in the workspace.
P4_CLIENT.blurb=The P4 client workspace name.
P4_PORT.blurb=The P4 Server connection port (e.g. perforce:1666).
P4_ROOT.blurb=The P4 client workspace root path.
P4_USER.blurb=The Perforce username.
P4_TICKET.blurb=A valid P4 ticket (if the credential is valid).
P4_REVIEW.blurb=The Swarm Review ID.
P4_REVIEW_TYPE.blurb=The Swarm Review Type ('shelved' or 'committed').
P4_INCREMENTAL.blurb=Build only oldest changelist returned by polling task.
P4_CLEANWORKSPACE.blurb="If true, force sync and update have list"
HUDSON_CHANGELOG_FILE.blurb=Location of the changelog file.
JENKINSFILE_PATH.blurb=Location of the Jenkinsfile in depot.
P4_STREAM_AT_CHANGE.blurb=The value of Stream At Change field configured for the stream workspace.